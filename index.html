<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>CASINO EDEN</title>
    <style>
        body { 
            margin: 0; background-color: #121212; color: white; 
            font-family: 'Arial', sans-serif; display: flex; flex-direction: column; align-items: center; 
        }
        
        h1 { 
            color: #ffcc00; font-size: 3em; margin-top: 40px; margin-bottom: 5px;
            font-family: 'Batang', 'Gungsuh', serif; 
        }
        
        #description { color: #888; margin-bottom: 30px; font-size: 0.9em; }

        #game-container { display: flex; gap: 20px; align-items: flex-start; }
        
        #canvas-wrapper { 
            position: relative; width: 600px; height: 600px; border-radius: 50%; 
            border: 10px solid #222; overflow: hidden; cursor: none; background: #000;
        }
        
        #hud { 
            width: 250px; background: #1e1e1e; padding: 20px; border-radius: 10px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.5); 
        }
        
        .stat-box { margin-bottom: 20px; }
        .label { color: #aaa; font-size: 0.8em; margin-bottom: 5px; text-transform: uppercase; }
        .val { font-size: 2em; font-weight: bold; color: #fff; }
        #total-score { color: #ffcc00; }

        #wind-indicator { color: #ff4d4d; font-size: 0.9em; margin-top: 10px; }

        #over-ui { display: none; margin-top: 15px; }
        input { width: 100%; padding: 10px; margin-bottom: 10px; background: #333; border: 1px solid #444; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #ffcc00; border: none; color: #000; font-weight: bold; cursor: pointer; }
        button:hover { background: #e6b800; }

        #leaderboard { width: 890px; margin: 40px 0; background: #1e1e1e; padding: 25px; border-radius: 10px; }
        .board-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .board-header h2 { margin: 0; color: #ffcc00; font-size: 1.5em; }
        
        #admin-reset-btn { width: auto; padding: 5px 10px; font-size: 0.7em; background: #333; color: #666; }
        #admin-reset-btn:hover { background: #444; color: #ff4d4d; }

        #rankList { list-style: none; padding: 0; margin: 0; }
        #rankList li { display: flex; justify-content: space-between; padding: 12px; border-bottom: 1px solid #2a2a2a; }
        
        #fake-cursor { position: absolute; width: 10px; height: 10px; background: white; border-radius: 50%; pointer-events: none; transform: translate(-50%, -50%); z-index: 10; box-shadow: 0 0 10px #fff; }
    </style>
</head>
<body>
    <h1>CASINO EDEN</h1>
    <div id="description">열 발의 다트로 남기는 불멸의 기록</div>

    <div id="game-container">
        <div id="canvas-wrapper">
            <div id="fake-cursor"></div>
            <canvas id="dartBoard" width="600" height="600"></canvas>
        </div>
        <div id="hud">
            <div class="stat-box">
                <div class="label">Darts Remaining</div>
                <div id="darts-val" class="val">10</div>
            </div>
            <div class="stat-box">
                <div class="label">Total Score</div>
                <div id="total-score" class="val">0</div>
            </div>
            <div class="stat-box">
                <div class="label">Last Hit</div>
                <div id="hit-val" class="val">0</div>
            </div>
            <div id="wind-indicator">Calculating Wind...</div>
            <div id="over-ui">
                <input type="text" id="nick" placeholder="NICKNAME">
                <button onclick="saveResult()">RECORD LEGACY</button>
            </div>
        </div>
    </div>

    <div id="leaderboard">
        <div class="board-header">
            <h2>전설의 전당(TOP 10)</h2>
            <button id="admin-reset-btn" onclick="adminReset()">RESET DATA</button>
        </div>
        <ul id="rankList">Syncing Data...</ul>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyC4cS9GhEAz32y9k11o5B950mbWxULZ1BY",
            databaseURL: "https://eden-dc2c5-default-rtdb.asia-southeast1.firebasedatabase.app"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const cvs = document.getElementById('dartBoard');
        const ctx = cvs.getContext('2d');
        const img = new Image();
        img.src = 'image_6.png';

        let score = 0, darts = 10, over = false;
        let mx = 300, my = 300, rot = 0, wx = 0, wy = 0;
        let marks = [];

        img.onload = () => { loop(); windTick(); };

        function loop() {
            if(over) return;
            ctx.clearRect(0,0,600,600);
            
            ctx.save(); 
            ctx.translate(300,300); 
            rot += 0.12; // 회전 속도 대폭 증가 (기존 0.04 -> 0.12)
            ctx.rotate(rot);
            ctx.drawImage(img, -300, -300, 600, 600); 
            ctx.restore();
            
            marks.forEach(m => {
                ctx.beginPath();
                ctx.arc(m.x, m.y, 5, 0, Math.PI * 2);
                ctx.fillStyle = "rgba(255, 0, 0, 0.7)";
                ctx.fill();
                ctx.strokeStyle = "white";
                ctx.lineWidth = 1;
                ctx.stroke();
                ctx.closePath();
            });
            
            // 마우스 흔들림 강도 대폭 증가 (기존 85 -> 150)
            window.tx = mx + (Math.random()-0.5)*150;
            window.ty = my + (Math.random()-0.5)*150;
            const cur = document.getElementById('fake-cursor');
            cur.style.left = window.tx+'px'; cur.style.top = window.ty+'px';
            
            requestAnimationFrame(loop);
        }

        cvs.onmousemove = (e) => { const r = cvs.getBoundingClientRect(); mx = e.clientX-r.left; my = e.clientY-r.top; };
        cvs.onmousedown = () => {
            if(over || darts <= 0) return;
            const fx = window.tx + wx, fy = window.ty + wy;
            marks.push({x: fx, y: fy});

            const d = Math.sqrt((fx-300)**2 + (fy-300)**2);
            let p = (d < 15) ? 50 : (d < 35) ? 25 : (d < 285) ? Math.floor(Math.random()*20)+1 : 0;
            
            score += p; darts--;
            document.getElementById('hit-val').innerText = p;
            document.getElementById('total-score').innerText = score;
            document.getElementById('darts-val').innerText = darts;
            if(darts <= 0) { over = true; document.getElementById('over-ui').style.display='block'; }
        };

        function windTick() {
            if(over) return;
            wx = (Math.random()-0.5)*50; wy = (Math.random()-0.5)*50;
            document.getElementById('wind-indicator').innerText = `WIND: ${Math.abs(Math.floor(wx))}m/s`;
            setTimeout(windTick, 2500);
        }

        function saveResult() {
            const n = document.getElementById('nick').value;
            if(!n) return alert("Please enter your name!");
            db.ref('rankingPro').push({name:n, score:score}).then(() => location.reload());
        }

        function adminReset() {
            const pw = prompt("Enter Admin Password to CLEAR LEADERBOARD.");
            if(pw === "1119") {
                if(confirm("DANGER: This will delete ALL rankings in the database. Proceed?")) {
                    db.ref('rankingPro').remove().then(() => {
                        alert("Database cleared.");
                        location.reload();
                    });
                }
            } else {
                alert("Incorrect Password.");
            }
        }

        db.ref('rankingPro').on('value', (snap) => {
            const list = document.getElementById('rankList');
            list.innerHTML = '';
            let arr = [];
            snap.forEach(c => { arr.push(c.val()); });
            arr.sort((a,b) => b.score - a.score);
            arr.slice(0,10).forEach((v, i) => {
                list.innerHTML += `<li><span>#${i+1} ${v.name}</span><strong>${v.score} PT</strong></li>`;
            });
            if(arr.length === 0) list.innerHTML = "<li>No records found.</li>";
        });
    </script>
</body>
</html>
