<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Impossible Dart Pro: Extreme</title>
    <style>
        body { margin: 0; padding: 0; background: #121212; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        h1 { margin: 20px 0 10px; color: #ff5252; text-shadow: 0 0 10px rgba(255,82,82,0.5); }
        #game-container { position: relative; display: flex; gap: 20px; padding: 20px; flex-wrap: wrap; justify-content: center; }
        #canvas-wrapper { position: relative; width: 600px; height: 600px; border-radius: 50%; border: 10px solid #222; box-shadow: 0 0 30px rgba(0,0,0,0.8); overflow: hidden; background: #1a1a1a; }
        canvas { cursor: none; }
        #hud { display: flex; flex-direction: column; gap: 15px; width: 250px; background: #1e1e1e; padding: 20px; border-radius: 12px; border: 1px solid #333; }
        .hud-item { font-size: 1.1em; font-weight: bold; padding: 10px; border-radius: 8px; border: 1px solid transparent;}
        #darts-left { background: rgba(33, 150, 243, 0.1); border-color: #2196f3; color: #2196f3; text-align: center; font-size: 2em;}
        #wind-status { background: rgba(255, 82, 82, 0.1); border-color: #ff5252; color: #ff5252; font-weight: normal;}
        input, button { padding: 12px; border-radius: 8px; border: 1px solid #444; background: #2c2c2c; color: white; font-size: 1em; width: 100%; box-sizing: border-box;}
        button { background: #ff5252; border: none; font-weight: bold; cursor: pointer; transition: 0.2s; margin-top: 5px; }
        button:hover { background: #ff7b7b; }
        #leaderboard { width: 100%; max-width: 870px; margin-top: 20px; background: #1e1e1e; padding: 20px; border-radius: 12px; border: 1px solid #333; margin-bottom: 50px;}
        #leaderboard h2 { margin-top: 0; color: #ffc107; border-bottom: 2px solid #333; padding-bottom: 10px; }
        #rankList { list-style: none; padding: 0; margin: 0; }
        #rankList li { display: flex; justify-content: space-between; padding: 12px; border-bottom: 1px solid #2a2a2a; }
        #rankList li:nth-child(1) { color: #ffd700; font-size: 1.2em; } /* 1등 강조 */
        #fake-cursor { position: absolute; width: 20px; height: 20px; border: 2px solid white; border-radius: 50%; pointer-events: none; transform: translate(-50%, -50%); z-index: 10; mix-blend-mode: difference; }
    </style>
</head>
<body>
    <h1>🎯 Impossible Dart Pro: Extreme</h1>
    <p style="color: #aaa; margin: 0 0 20px;">10발의 기회! 최고 점수로 전설의 전당에 이름을 올리세요.</p>
    
    <div id="game-container">
        <div id="canvas-wrapper">
            <div id="fake-cursor"></div>
            <canvas id="dartBoard" width="600" height="600"></canvas>
        </div>
        <div id="hud">
            <div id="darts-left" class="hud-item">10</div>
            <div class="hud-item">현재 점수: <span id="current-score-val">0</span></div>
            <div class="hud-item">누적 점수: <span id="total-score-val">0</span></div>
            <div id="wind-status" class="hud-item"><div id="wind-desc">바람 계산 중...</div></div>
            <div id="game-over-zone" style="display:none; flex-direction:column; gap:10px;">
                <input type="text" id="playerName" placeholder="닉네임 (3자 이상)">
                <button id="submitBtn" onclick="submitScore()">랭킹 등록</button>
                <button style="background:#444;" onclick="location.reload()">다시 도전</button>
            </div>
        </div>
    </div>
    
    <div id="leaderboard">
        <h2>🏆 실시간 전설의 전당 (Top 10)</h2>
        <ul id="rankList">랭킹을 불러오는 중...</ul>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyC4cS9GhEAz32y9k11o5B950mbWxULZ1BY",
            authDomain: "eden-dc2c5.firebaseapp.com",
            projectId: "eden-dc2c5",
            databaseURL: "https://eden-dc2c5-default-rtdb.asia-southeast1.firebasedatabase.app",
            storageBucket: "eden-dc2c5.firebasestorage.app",
            messagingSenderId: "889059945973",
            appId: "1:889059945973:web:211078b67f46e6796d04bc"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const canvas = document.getElementById('dartBoard');
        const ctx = canvas.getContext('2d');
        const fakeCursor = document.getElementById('fake-cursor');
        
        let score = 0, dartsLeft = 10, isGameOver = false;
        let mouseX = 300, mouseY = 300, finalX = 300, finalY = 300;
        let targetRotation = 0, rotationSpeed = 0.05, wind = { x: 0, y: 0 };
        const SHAKE = 80;

        function drawBoard() {
            ctx.clearRect(0, 0, 600, 600);
            ctx.save(); ctx.translate(300, 300);
            targetRotation += rotationSpeed;
            if(Math.random() < 0.02) rotationSpeed = (Math.random() - 0.5) * 0.15;
            ctx.rotate(targetRotation);
            
            ctx.beginPath(); ctx.arc(0, 0, 290, 0, Math.PI * 2); ctx.fillStyle = '#1a1a1a'; ctx.fill();
            const ringRadii = [280, 260, 180, 160];
            ringRadii.forEach((r, i) => {
                ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI * 2);
                ctx.fillStyle = (i % 2 === 0) ? '#000' : '#f44336'; ctx.fill();
            });
            ctx.beginPath(); ctx.arc(0, 0, 25, 0, Math.PI * 2); ctx.fillStyle = '#ffc107'; ctx.fill();
            ctx.beginPath(); ctx.arc(0, 0, 10, 0, Math.PI * 2); ctx.fillStyle = '#ff5252'; ctx.fill();
            ctx.restore();
        }

        function update() {
            if (isGameOver) return;
            finalX = mouseX + (Math.random() - 0.5) * SHAKE;
            finalY = mouseY + (Math.random() - 0.5) * SHAKE;
            fakeCursor.style.left = finalX + 'px';
            fakeCursor.style.top = finalY + 'px';
            drawBoard();
            requestAnimationFrame(update);
        }

        function changeWind() {
            if (isGameOver) return;
            const dirs = ['북', '북동', '동', '남동', '남', '남서', '서', '북서'];
            const dir = dirs[Math.floor(Math.random() * 8)];
            const s = Math.floor(Math.random() * 50) + 10;
            wind.x = dir.includes('동') ? s : (dir.includes('서') ? -s : 0);
            wind.y = dir.includes('남') ? s : (dir.includes('북') ? -s : 0);
            document.getElementById('wind-desc').innerText = `${dir}풍 (${s}m/s)`;
            setTimeout(changeWind, 3000);
        }

        canvas.addEventListener('mousemove', (e) => {
            const r = canvas.getBoundingClientRect();
            mouseX = e.clientX - r.left; mouseY = e.clientY - r.top;
        });

        canvas.addEventListener('mousedown', () => {
            if (isGameOver || dartsLeft <= 0) return;
            const sx = finalX + wind.x, sy = finalY + wind.y;
            const d = Math.sqrt((sx - 300)**2 + (sy - 300)**2);
            let s = d <= 10 ? 100 : (d <= 25 ? 50 : (d > 280 ? 0 : Math.max(1, Math.floor((280 - d) / 5))));
            score += s; dartsLeft--;
            document.getElementById('current-score-val').innerText = s;
            document.getElementById('total-score-val').innerText = score;
            document.getElementById('darts-left').innerText = dartsLeft;
            if (dartsLeft <= 0) endGame();
        });

        function endGame() { 
            isGameOver = true; 
            document.getElementById('game-over-zone').style.display = 'flex'; 
            fakeCursor.style.display = 'none';
        }

        function submitScore() {
            const name = document.getElementById('playerName').value.trim();
            if (name.length < 3) return alert("닉네임을 3자 이상 입력하세요.");
            
            document.getElementById('submitBtn').disabled = true;
            document.getElementById('submitBtn').innerText = "등록 중...";

            // Number(score)를 사용하여 확실하게 숫자로 저장
            db.ref('rankingPro/').push({
                name: name,
                score: Number(score),
                date: Date.now()
            }).then(() => {
                alert("기록이 등록되었습니다!");
                document.getElementById('game-over-zone').style.display = 'none';
            }).catch((err) => {
                alert("등록 실패: " + err.message);
                document.getElementById('submitBtn').disabled = false;
                document.getElementById('submitBtn').innerText = "랭킹 등록";
            });
        }

        // 랭킹 리스너 수정 (점수 기준 정렬 보장)
        db.ref('rankingPro/').orderByChild('score').on('value', (snap) => {
            const list = document.getElementById('rankList');
            list.innerHTML = '';
            let items = [];
            
            snap.forEach(child => {
                items.push(child.val());
            });
            
            // 점수 높은 순서로 정렬 후 상위 10개만 추출
            items.sort((a, b) => b.score - a.score);
            const top10 = items.slice(0, 10);

            top10.forEach((d, i) => {
                list.innerHTML += `<li><span><b>#${i+1}</b> ${d.name}</span><span><b>${d.score}점</b></span></li>`;
            });
            
            if(items.length === 0) list.innerHTML = "<li>아직 등록된 전설이 없습니다!</li>";
        });

        changeWind(); update();
    </script>
</body>
</html>
