<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>CASINO EDEN</title>
    <style>
        /* 전체 테마 색상 수정: 노란색 -> 어두운 빨간색 */
        body { 
            margin: 0; background-color: #121212; color: white; 
            font-family: 'Arial', sans-serif; display: flex; flex-direction: column; align-items: center; 
        }
        
        #tab-menu { display: flex; gap: 10px; margin-top: 20px; }
        .tab-btn { padding: 10px 30px; background: #222; border: 1px solid #444; color: #888; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .tab-btn.active { background: #b30000; color: #fff; border-color: #b30000; } /* 어두운 빨간색 */

        /* 제목 및 소제목 수정 */
        h1 { color: #b30000; font-size: 3.5em; margin-top: 20px; margin-bottom: 5px; font-family: 'Batang', 'Gungsuh', serif; letter-spacing: 5px; }
        #description { color: #666; margin-bottom: 30px; font-size: 1em; font-weight: bold; }

        .game-section { display: none; flex-direction: column; align-items: center; }
        .game-section.active { display: flex; }

        /* 다트판 (기존 로직 및 디자인 절대 보존) */
        #canvas-wrapper { position: relative; width: 600px; height: 600px; border-radius: 50%; border: 10px solid #222; overflow: hidden; cursor: none; background: #000; }
        #hud { width: 250px; background: #1e1e1e; padding: 20px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .stat-box { margin-bottom: 20px; }
        .label { color: #aaa; font-size: 0.8em; margin-bottom: 5px; text-transform: uppercase; }
        .val { font-size: 2em; font-weight: bold; color: #fff; }
        #total-score { color: #b30000; } /* 다트 스코어도 빨간색으로 통일 */

        /* 슬롯머신 수정본 */
        #slot-machine { width: 700px; background: #1a1a1a; padding: 50px; border-radius: 20px; border: 8px solid #333; text-align: center; box-shadow: inset 0 0 50px #000; }
        .slot-container { display: flex; justify-content: center; gap: 15px; margin-bottom: 30px; }
        .slot-reel { 
            width: 120px; height: 160px; background: linear-gradient(to bottom, #111, #333, #111); 
            border: 4px solid #b30000; font-size: 4.5em; display: flex; align-items: center; 
            justify-content: center; border-radius: 10px; color: #fff; overflow: hidden;
        }
        #slot-msg { height: 40px; color: #b30000; margin-bottom: 10px; font-weight: bold; font-size: 1.2em; }

        input { width: 100%; padding: 12px; margin-bottom: 10px; background: #222; border: 1px solid #444; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 18px; background: #b30000; border: none; color: #fff; font-weight: bold; cursor: pointer; font-size: 1.2em; transition: 0.2s; }
        button:hover { background: #ff0000; box-shadow: 0 0 20px rgba(179, 0, 0, 0.4); }

        /* 랭킹 섹션 */
        .leaderboard { width: 890px; margin: 40px 0; background: #1e1e1e; padding: 25px; border-radius: 10px; }
        .board-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .board-header h2 { margin: 0; color: #b30000; font-size: 1.5em; }
        .admin-reset-btn { width: auto; padding: 5px 10px; font-size: 0.7em; background: #333; color: #666; }
        .rankList { list-style: none; padding: 0; margin: 0; }
        .rankList li { display: flex; justify-content: space-between; padding: 12px; border-bottom: 1px solid #2a2a2a; }
        
        /* 다트 커서 */
        #fake-cursor { position: absolute; width: 10px; height: 10px; background: white; border-radius: 50%; pointer-events: none; transform: translate(-50%, -50%); z-index: 10; box-shadow: 0 0 10px #fff; }

        /* 슬롯 굴러가는 애니메이션 */
        @keyframes roll {
            0% { transform: translateY(-50px); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translateY(50px); opacity: 0; }
        }
        .rolling { animation: roll 0.1s infinite; }
    </style>
</head>
<body>
    <div id="tab-menu">
        <div class="tab-btn active" onclick="switchTab('dart')">DART GAME</div>
        <div class="tab-btn" onclick="switchTab('slot')">SLOT MACHINE</div>
    </div>

    <h1>EDEN CASINO</h1>
    <div id="description">운명이 결정되는 단 한 번의 찬스</div>

    <div id="dart-section" class="game-section active">
        <div id="game-container" style="display: flex; gap: 20px;">
            <div id="canvas-wrapper"><div id="fake-cursor"></div><canvas id="dartBoard" width="600" height="600"></canvas></div>
            <div id="hud">
                <div class="stat-box"><div class="label">Darts Remaining</div><div id="darts-val" class="val">10</div></div>
                <div class="stat-box"><div class="label">Total Score</div><div id="total-score" class="val">0</div></div>
                <div class="stat-box"><div class="label">Last Hit</div><div id="hit-val" class="val">0</div></div>
                <div id="wind-indicator">Calculating...</div>
                <div id="over-ui" style="display:none;">
                    <input type="text" id="nick" placeholder="NICKNAME"><button onclick="saveResult('dart')">RECORD LEGACY</button>
                </div>
            </div>
        </div>
        <div class="leaderboard">
            <div class="board-header"><h2>전설의 전당(TOP 10)</h2><button class="admin-reset-btn" onclick="adminReset('dart')">RESET DATA</button></div>
            <ul id="rankList" class="rankList"></ul>
        </div>
    </div>

    <div id="slot-section" class="game-section">
        <div id="slot-machine">
            <div id="slot-msg">PRESS SPIN TO TEST YOUR LUCK</div>
            <div class="slot-container">
                <div id="reel1" class="slot-reel">♠</div>
                <div id="reel2" class="slot-reel">◆</div>
                <div id="reel3" class="slot-reel">♥</div>
                <div id="reel4" class="slot-reel">♣</div>
            </div>
            <button id="spin-btn" onclick="spinSlot()">SPIN</button>
            <div id="slot-over-ui" style="display:none; margin-top:20px;">
                <p style="color:#b30000; font-weight:bold; font-size:1.5em;">🎉 JACKPOT! ENTER YOUR NAME</p>
                <input type="text" id="slot-nick" placeholder="NICKNAME">
                <button onclick="saveResult('slot')">RECORD LEGACY</button>
            </div>
        </div>
        <div class="leaderboard">
            <div class="board-header"><h2>SLOT TOP 10</h2><button class="admin-reset-btn" onclick="adminReset('slot')">RESET DATA</button></div>
            <ul id="slotRankList" class="rankList"></ul>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyC4cS9GhEAz32y9k11o5B950mbWxULZ1BY",
            databaseURL: "https://eden-dc2c5-default-rtdb.asia-southeast1.firebasedatabase.app"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function switchTab(game) {
            document.querySelectorAll('.game-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(game + '-section').classList.add('active');
            event.target.classList.add('active');
        }

        /* --- 다트 게임 로직 (불변) --- */
        const cvs = document.getElementById('dartBoard'); const ctx = cvs.getContext('2d'); const img = new Image(); img.src = 'image_6.png';
        let score = 0, darts = 10, over = false, mx = 300, my = 300, rot = 0, wx = 0, wy = 0, marks = [];
        img.onload = () => { loop(); windTick(); };
        function loop() {
            if(over) return;
            ctx.clearRect(0,0,600,600); ctx.save(); ctx.translate(300,300); rot += 0.12; ctx.rotate(rot); ctx.drawImage(img, -300, -300, 600, 600); ctx.restore();
            marks.forEach(m => { ctx.beginPath(); ctx.arc(m.x, m.y, 5, 0, Math.PI*2); ctx.fillStyle="rgba(255,0,0,0.7)"; ctx.fill(); ctx.stroke(); });
            window.tx = mx + (Math.random()-0.5)*150; window.ty = my + (Math.random()-0.5)*150;
            const cur = document.getElementById('fake-cursor'); cur.style.left = window.tx+'px'; cur.style.top = window.ty+'px';
            requestAnimationFrame(loop);
        }
        cvs.onmousemove = (e) => { const r = cvs.getBoundingClientRect(); mx = e.clientX-r.left; my = e.clientY-r.top; };
        cvs.onmousedown = () => {
            if(over || darts <= 0 || !document.getElementById('dart-section').classList.contains('active')) return;
            const fx = window.tx + wx, fy = window.ty + wy; marks.push({x: fx, y: fy});
            const d = Math.sqrt((fx-300)**2 + (fy-300)**2);
            let p = (d < 15) ? 50 : (d < 35) ? 25 : (d < 285) ? Math.floor(Math.random()*20)+1 : 0;
            score += p; darts--; document.getElementById('hit-val').innerText = p; document.getElementById('total-score').innerText = score; document.getElementById('darts-val').innerText = darts;
            if(darts <= 0) { over = true; document.getElementById('over-ui').style.display='block'; }
        };
        function windTick() { if(over) return; wx = (Math.random()-0.5)*50; wy = (Math.random()-0.5)*50; document.getElementById('wind-indicator').innerText = `WIND: ${Math.abs(Math.floor(wx))}m/s`; setTimeout(windTick, 2500); }

        /* --- 슬롯머신 로직 (수정본) --- */
        let lastWinAmt = 0;
        const symbols = ['♠','◆','♥','♣'];
        // 꽝 확률을 높이기 위한 가중치 풀 (클로버 비율 압도적 증가)
        const weightedPool = [
            '♠','♠','♠', // 스페이드 3개
            '◆','◆','◆', // 다이아 3개
            '♥','♥','♥','♥', // 하트 4개
            '♣','♣','♣','♣','♣','♣','♣','♣','♣','♣','♣','♣','♣','♣','♣' // 클로버 다수 (꽝)
        ];

        function spinSlot() {
            document.getElementById('slot-over-ui').style.display = 'none';
            document.getElementById('slot-msg').innerText = "Good Luck...";
            
            const btn = document.getElementById('spin-btn');
            btn.disabled = true;

            // 회전 모션 시작
            for(let i=1; i<=4; i++) {
                document.getElementById('reel'+i).classList.add('rolling');
            }

            const res = [];
            for(let i=0; i<4; i++) {
                res.push(weightedPool[Math.floor(Math.random()*weightedPool.length)]);
            }

            // 순차적으로 결과 멈춤
            for(let i=1; i<=4; i++) {
                setTimeout(() => {
                    const reel = document.getElementById('reel'+i);
                    reel.classList.remove('rolling');
                    reel.innerText = res[i-1];
                }, i * 500);
            }

            setTimeout(() => {
                btn.disabled = false;
                if(res.every(val => val === res[0])) {
                    const symbol = res[0];
                    let win = 0;
                    if(symbol === '♠') win = 1000;
                    else if(symbol === '◆') win = 600;
                    else if(symbol === '♥') win = 200;
                    else if(symbol === '♣') win = 0;

                    if(win > 0) {
                        lastWinAmt = win;
                        document.getElementById('slot-msg').innerText = `JACKPOT! YOU WON ${win} PT`;
                        document.getElementById('slot-over-ui').style.display = 'block';
                    } else {
                        document.getElementById('slot-msg').innerText = "CLOVER... NO REWARD.";
                    }
                } else {
                    document.getElementById('slot-msg').innerText = "FAILED. TRY AGAIN.";
                }
            }, 2200);
        }

        /* --- 공통 기능 --- */
        function saveResult(type) {
            if(type === 'dart') {
                const n = document.getElementById('nick').value; if(!n) return;
                db.ref('rankingPro').push({name:n, score:score}).then(() => location.reload());
            } else {
                const n = document.getElementById('slot-nick').value; if(!n) return;
                db.ref('slotRanking').push({name:n, score:lastWinAmt}).then(() => location.reload());
            }
        }

        function adminReset(type) {
            if(prompt("Password?") === "1119") {
                db.ref(type === 'dart' ? 'rankingPro' : 'slotRanking').remove().then(() => alert("Cleared."));
            }
        }

        function loadRank(path, listId) {
            db.ref(path).on('value', (snap) => {
                const list = document.getElementById(listId); list.innerHTML = '';
                let arr = []; snap.forEach(c => arr.push(c.val()));
                arr.sort((a,b) => b.score - a.score).slice(0,10).forEach((v, i) => {
                    list.innerHTML += `<li><span>#${i+1} ${v.name}</span><strong>${v.score} PT</strong></li>`;
                });
            });
        }
        loadRank('rankingPro', 'rankList'); loadRank('slotRanking', 'slotRankList');
    </script>
</body>
</html>
