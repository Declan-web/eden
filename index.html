<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>CASINO EDEN</title>
    <style>
        body { 
            margin: 0; background-color: #121212; color: white; 
            font-family: 'Arial', sans-serif; display: flex; flex-direction: column; align-items: center; 
        }
        
        /* 탭 메뉴 스타일 */
        #tab-menu {
            display: flex; gap: 10px; margin-top: 20px;
        }
        .tab-btn {
            padding: 10px 30px; background: #222; border: 1px solid #444; color: #888;
            cursor: pointer; font-weight: bold; transition: 0.3s;
        }
        .tab-btn.active {
            background: #ffcc00; color: #000; border-color: #ffcc00;
        }

        h1 { 
            color: #ffcc00; font-size: 3em; margin-top: 20px; margin-bottom: 5px;
            font-family: 'Batang', 'Gungsuh', serif; 
        }
        
        #description { color: #888; margin-bottom: 30px; font-size: 0.9em; }

        /* 게임 섹션 제어 */
        .game-section { display: none; flex-direction: column; align-items: center; }
        .game-section.active { display: flex; }

        #game-container { display: flex; gap: 20px; align-items: flex-start; }
        
        /* 다트판 (변경 절대 없음) */
        #canvas-wrapper { 
            position: relative; width: 600px; height: 600px; border-radius: 50%; 
            border: 10px solid #222; overflow: hidden; cursor: none; background: #000;
        }
        
        #hud { 
            width: 250px; background: #1e1e1e; padding: 20px; border-radius: 10px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.5); 
        }
        
        .stat-box { margin-bottom: 20px; }
        .label { color: #aaa; font-size: 0.8em; margin-bottom: 5px; text-transform: uppercase; }
        .val { font-size: 2em; font-weight: bold; color: #fff; }
        #total-score { color: #ffcc00; }
        #wind-indicator { color: #ff4d4d; font-size: 0.9em; margin-top: 10px; }

        /* 슬롯머신 디자인 */
        #slot-machine {
            width: 600px; background: #1e1e1e; padding: 40px; border-radius: 20px;
            border: 10px solid #333; text-align: center;
        }
        .slot-container {
            display: flex; justify-content: center; gap: 20px; margin-bottom: 30px;
        }
        .slot-reel {
            width: 120px; height: 150px; background: #000; border: 5px solid #ffcc00;
            font-size: 5em; display: flex; align-items: center; justify-content: center;
            border-radius: 10px;
        }
        #slot-credit { color: #ffcc00; font-size: 2em; margin-bottom: 20px; }

        #over-ui, #slot-over-ui { display: none; margin-top: 15px; width: 100%; }
        input { width: 100%; padding: 10px; margin-bottom: 10px; background: #333; border: 1px solid #444; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #ffcc00; border: none; color: #000; font-weight: bold; cursor: pointer; }
        button:hover { background: #e6b800; }

        /* 랭킹 섹션 */
        .leaderboard { width: 890px; margin: 40px 0; background: #1e1e1e; padding: 25px; border-radius: 10px; }
        .board-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .board-header h2 { margin: 0; color: #ffcc00; font-size: 1.5em; }
        
        .admin-reset-btn { width: auto; padding: 5px 10px; font-size: 0.7em; background: #333; color: #666; }
        .admin-reset-btn:hover { background: #444; color: #ff4d4d; }

        .rankList { list-style: none; padding: 0; margin: 0; }
        .rankList li { display: flex; justify-content: space-between; padding: 12px; border-bottom: 1px solid #2a2a2a; }
        
        #fake-cursor { position: absolute; width: 10px; height: 10px; background: white; border-radius: 50%; pointer-events: none; transform: translate(-50%, -50%); z-index: 10; box-shadow: 0 0 10px #fff; }
    </style>
</head>
<body>
    <div id="tab-menu">
        <div class="tab-btn active" onclick="switchTab('dart')">DART GAME</div>
        <div class="tab-btn" onclick="switchTab('slot')">SLOT MACHINE</div>
    </div>

    <h1>CASINO EDEN</h1>
    <div id="description">열 발의 다트로 남기는 불멸의 기록</div>

    <div id="dart-section" class="game-section active">
        <div id="game-container">
            <div id="canvas-wrapper">
                <div id="fake-cursor"></div>
                <canvas id="dartBoard" width="600" height="600"></canvas>
            </div>
            <div id="hud">
                <div class="stat-box"><div class="label">Darts Remaining</div><div id="darts-val" class="val">10</div></div>
                <div class="stat-box"><div class="label">Total Score</div><div id="total-score" class="val">0</div></div>
                <div class="stat-box"><div class="label">Last Hit</div><div id="hit-val" class="val">0</div></div>
                <div id="wind-indicator">Calculating...</div>
                <div id="over-ui">
                    <input type="text" id="nick" placeholder="NICKNAME">
                    <button onclick="saveResult('dart')">RECORD LEGACY</button>
                </div>
            </div>
        </div>
        <div class="leaderboard">
            <div class="board-header"><h2>전설의 전당(TOP 10)</h2><button class="admin-reset-btn" onclick="adminReset('dart')">RESET DATA</button></div>
            <ul id="rankList" class="rankList">Syncing Data...</ul>
        </div>
    </div>

    <div id="slot-section" class="game-section">
        <div id="slot-machine">
            <div id="slot-credit">CREDITS: 1000</div>
            <div class="slot-container">
                <div id="reel1" class="slot-reel">💎</div>
                <div id="reel2" class="slot-reel">💎</div>
                <div id="reel3" class="slot-reel">💎</div>
            </div>
            <button id="spin-btn" style="height: 60px; font-size: 1.5em;" onclick="spinSlot()">SPIN (100 COST)</button>
            <div id="slot-over-ui">
                <input type="text" id="slot-nick" placeholder="NICKNAME">
                <button onclick="saveResult('slot')">RECORD LEGACY</button>
            </div>
        </div>
        <div class="leaderboard">
            <div class="board-header"><h2>SLOT TOP 10</h2><button class="admin-reset-btn" onclick="adminReset('slot')">RESET DATA</button></div>
            <ul id="slotRankList" class="rankList">Syncing Data...</ul>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyC4cS9GhEAz32y9k11o5B950mbWxULZ1BY",
            databaseURL: "https://eden-dc2c5-default-rtdb.asia-southeast1.firebasedatabase.app"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // 탭 전환 로직
        function switchTab(game) {
            document.querySelectorAll('.game-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(game + '-section').classList.add('active');
            event.target.classList.add('active');
        }

        /* --- 다트 게임 로직 (완전 불변) --- */
        const cvs = document.getElementById('dartBoard');
        const ctx = cvs.getContext('2d');
        const img = new Image(); img.src = 'image_6.png';
        let score = 0, darts = 10, over = false, mx = 300, my = 300, rot = 0, wx = 0, wy = 0, marks = [];
        img.onload = () => { loop(); windTick(); };
        function loop() {
            if(over) return;
            ctx.clearRect(0,0,600,600);
            ctx.save(); ctx.translate(300,300); rot += 0.12; ctx.rotate(rot);
            ctx.drawImage(img, -300, -300, 600, 600); ctx.restore();
            marks.forEach(m => { ctx.beginPath(); ctx.arc(m.x, m.y, 5, 0, Math.PI*2); ctx.fillStyle="rgba(255,0,0,0.7)"; ctx.fill(); ctx.stroke(); });
            window.tx = mx + (Math.random()-0.5)*150; window.ty = my + (Math.random()-0.5)*150;
            const cur = document.getElementById('fake-cursor'); cur.style.left = window.tx+'px'; cur.style.top = window.ty+'px';
            requestAnimationFrame(loop);
        }
        cvs.onmousemove = (e) => { const r = cvs.getBoundingClientRect(); mx = e.clientX-r.left; my = e.clientY-r.top; };
        cvs.onmousedown = () => {
            if(over || darts <= 0 || !document.getElementById('dart-section').classList.contains('active')) return;
            const fx = window.tx + wx, fy = window.ty + wy; marks.push({x: fx, y: fy});
            const d = Math.sqrt((fx-300)**2 + (fy-300)**2);
            let p = (d < 15) ? 50 : (d < 35) ? 25 : (d < 285) ? Math.floor(Math.random()*20)+1 : 0;
            score += p; darts--;
            document.getElementById('hit-val').innerText = p; document.getElementById('total-score').innerText = score; document.getElementById('darts-val').innerText = darts;
            if(darts <= 0) { over = true; document.getElementById('over-ui').style.display='block'; }
        };
        function windTick() { if(over) return; wx = (Math.random()-0.5)*50; wy = (Math.random()-0.5)*50; document.getElementById('wind-indicator').innerText = `WIND: ${Math.abs(Math.floor(wx))}m/s`; setTimeout(windTick, 2500); }

        /* --- 슬롯머신 로직 --- */
        let credit = 1000;
        const symbols = ['💎', '🍒', '🔔', '7️⃣', '🍀', '🍎'];
        function spinSlot() {
            if(credit < 100) return alert("Not enough credits!");
            credit -= 100;
            document.getElementById('slot-credit').innerText = `CREDITS: ${credit}`;
            const spinResults = [
                symbols[Math.floor(Math.random()*symbols.length)],
                symbols[Math.floor(Math.random()*symbols.length)],
                symbols[Math.floor(Math.random()*symbols.length)]
            ];
            
            setTimeout(() => { document.getElementById('reel1').innerText = spinResults[0]; }, 200);
            setTimeout(() => { document.getElementById('reel2').innerText = spinResults[1]; }, 400);
            setTimeout(() => { 
                document.getElementById('reel3').innerText = spinResults[2]; 
                checkSlotResult(spinResults);
            }, 600);
        }
        function checkSlotResult(res) {
            if(res[0] === res[1] && res[1] === res[2]) {
                const win = 2000; credit += win; alert("JACKPOT! +2000");
            } else if(res[0] === res[1] || res[1] === res[2] || res[0] === res[2]) {
                const win = 300; credit += win;
            }
            document.getElementById('slot-credit').innerText = `CREDITS: ${credit}`;
            if(credit <= 0) document.getElementById('slot-over-ui').style.display = 'block';
        }

        /* --- 공통 기능 (DB 저장 & 초기화) --- */
        function saveResult(type) {
            if(type === 'dart') {
                const n = document.getElementById('nick').value;
                if(!n) return;
                db.ref('rankingPro').push({name:n, score:score}).then(() => location.reload());
            } else {
                const n = document.getElementById('slot-nick').value;
                if(!n) return;
                db.ref('slotRanking').push({name:n, score:credit}).then(() => location.reload());
            }
        }

        function adminReset(type) {
            const pw = prompt("Enter Password.");
            if(pw === "1119") {
                const path = (type === 'dart') ? 'rankingPro' : 'slotRanking';
                db.ref(path).remove().then(() => alert("Data cleared."));
            }
        }

        // 랭킹 리스너 (다트 & 슬롯)
        function loadRank(path, listId) {
            db.ref(path).on('value', (snap) => {
                const list = document.getElementById(listId);
                list.innerHTML = ''; let arr = [];
                snap.forEach(c => arr.push(c.val()));
                arr.sort((a,b) => b.score - a.score).slice(0,10).forEach((v, i) => {
                    list.innerHTML += `<li><span>#${i+1} ${v.name}</span><strong>${v.score} PT</strong></li>`;
                });
            });
        }
        loadRank('rankingPro', 'rankList');
        loadRank('slotRanking', 'slotRankList');
    </script>
</body>
</html>
