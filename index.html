<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>CASINO EDEN</title>
    <style>
        :root {
            --red: #4a0404;
            --gold: #d4af37;
            --black: #050505;
        }
        body { 
            margin: 0; background: radial-gradient(circle, var(--red) 0%, var(--black) 100%); 
            color: #eee; font-family: 'serif'; display: flex; flex-direction: column; align-items: center; 
        }
        h1 { color: var(--gold); font-size: 3.5em; letter-spacing: 10px; margin-top: 40px; text-shadow: 0 0 20px rgba(212,175,55,0.4); }
        #game-container { display: flex; gap: 30px; margin-top: 20px; }
        #canvas-wrapper { 
            position: relative; width: 600px; height: 600px; border-radius: 50%; 
            border: 15px solid #111; box-shadow: 0 0 50px #000; overflow: hidden; cursor: none;
        }
        #hud { width: 280px; background: rgba(0,0,0,0.85); padding: 30px; border: 1px solid var(--red); }
        .stat { margin-bottom: 20px; border-bottom: 1px solid #222; padding-bottom: 10px; }
        .label { color: #888; font-size: 0.8em; text-transform: uppercase; }
        .val { font-size: 1.8em; color: var(--gold); }
        #over-ui { display:none; margin-top: 20px; }
        input, button { width: 100%; padding: 12px; margin-top: 10px; border: 1px solid var(--gold); background: #000; color: var(--gold); }
        button { background: var(--red); color: white; border: none; font-weight: bold; cursor: pointer; }
        #leaderboard { width: 920px; margin: 50px 0; background: rgba(0,0,0,0.9); padding: 30px; border-top: 3px solid var(--gold); }
        #rankList { list-style: none; padding: 0; }
        #rankList li { display: flex; justify-content: space-between; padding: 15px; border-bottom: 1px solid #1a1a1a; }
        #fake-cursor { position: absolute; width: 12px; height: 12px; background: #fff; border-radius: 50%; pointer-events: none; transform: translate(-50%, -50%); z-index: 10; box-shadow: 0 0 10px var(--gold); }
    </style>
</head>
<body>
    <h1>CASINO EDEN</h1>
    <div id="game-container">
        <div id="canvas-wrapper">
            <div id="fake-cursor"></div>
            <canvas id="dartBoard" width="600" height="600"></canvas>
        </div>
        <div id="hud">
            <div class="stat"><div class="label">Ammo</div><div id="darts" class="val">10</div></div>
            <div class="stat"><div class="label">Total Score</div><div id="total" class="val">0 PT</div></div>
            <div class="stat"><div class="label">Hit</div><div id="last-hit" class="val">0</div></div>
            <div id="over-ui">
                <input type="text" id="nick" placeholder="NAME">
                <button onclick="save()">REGISTER LEGACY</button>
            </div>
        </div>
    </div>
    <div id="leaderboard">
        <h2 style="color:var(--gold); text-align:center;">전설의 전당 (Top 10)</h2>
        <ul id="rankList">데이터 동기화 중...</ul>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyC4cS9GhEAz32y9k11o5B950mbWxULZ1BY",
            databaseURL: "https://eden-dc2c5-default-rtdb.asia-southeast1.firebasedatabase.app"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const cvs = document.getElementById('dartBoard');
        const ctx = cvs.getContext('2d');
        const img = new Image();
        // ★ 중요: 외부 링크가 아닌, 사용자가 GitHub에 올린 로컬 이미지 파일을 직접 사용합니다.
        img.src = 'image_6.png'; 

        let score = 0, darts = 10, over = false;
        let mx = 300, my = 300, rot = 0;

        img.onload = () => { loop(); };
        img.onerror = () => { ctx.fillStyle="#fff"; ctx.fillText("이미지 로드 실패: image_6.png 파일을 확인하세요.", 150, 300); };

        function loop() {
            if(over) return;
            ctx.clearRect(0,0,600,600);
            ctx.save();
            ctx.translate(300,300);
            rot += 0.04;
            ctx.rotate(rot);
            // 이미지를 캔버스 600x600 규격에 꽉 차게 그립니다.
            ctx.drawImage(img, -300, -300, 600, 600);
            ctx.restore();
            
            // 수전증 효과
            window.tx = mx + (Math.random()-0.5)*80;
            window.ty = my + (Math.random()-0.5)*80;
            document.getElementById('fake-cursor').style.left = window.tx+'px';
            document.getElementById('fake-cursor').style.top = window.ty+'px';
            
            requestAnimationFrame(loop);
        }

        cvs.onmousemove = (e) => { const r = cvs.getBoundingClientRect(); mx = e.clientX-r.left; my = e.clientY-r.top; };
        cvs.onmousedown = () => {
            if(over || darts <= 0) return;
            
            const dist = Math.sqrt((window.tx-300)**2 + (window.ty-300)**2);
            let hit = 0;

            // 점수 계산 (NaN 방지 및 규격 조정)
            if(dist < 15) hit = 50;
            else if(dist < 35) hit = 25;
            else if(dist < 280) hit = Math.floor(Math.random()*20) + 1;
            else hit = 0;

            score += hit;
            darts--;
            document.getElementById('last-hit').innerText = hit;
            document.getElementById('total').innerText = score + " PT";
            document.getElementById('darts').innerText = darts;
            
            if(darts <= 0) { over = true; document.getElementById('over-ui').style.display='block'; }
        };

        function save() {
            const n = document.getElementById('nick').value;
            if(!n) return alert("이름을 입력하세요.");
            db.ref('rankingPro').push({name:n, score:score}).then(()=>location.reload());
        }

        db.ref('rankingPro').on('value', (s) => {
            const list = document.getElementById('rankList');
            list.innerHTML = '';
            let arr = [];
            s.forEach(c => { arr.push(c.val()); });
            arr.sort((a,b) => b.score - a.score);
            arr.slice(0,10).forEach((v, i) => {
                list.innerHTML += `<li><span>#${i+1} ${v.name}</span><span>${v.score} PT</span></li>`;
            });
            if(arr.length === 0) list.innerHTML = "<li>등록된 데이터가 없습니다.</li>";
        });
    </script>
</body>
</html>
