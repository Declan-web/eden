<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CASINO EDEN</title>
    <style>
        /* 어두운 빨간색과 블랙로즈 톤 설정 */
        :root {
            --bg-dark: #0a0a0a;
            --rose-dark: #4a0404;
            --rose-bright: #8b0000;
            --gold: #c5a059;
            --text-gray: #b0b0b0;
        }

        body { 
            margin: 0; padding: 0; 
            background: radial-gradient(circle, var(--rose-dark) 0%, var(--bg-dark) 100%); 
            color: #e0e0e0; 
            font-family: 'Georgia', serif; 
            display: flex; flex-direction: column; align-items: center; min-height: 100vh; 
        }

        h1 { 
            margin: 30px 0 5px; 
            color: var(--gold); 
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8), 0 0 15px var(--rose-bright);
            font-size: 3em;
            letter-spacing: 5px;
        }

        #description { color: var(--text-gray); margin: 0 0 30px; text-align: center; font-style: italic; }

        #game-container { position: relative; display: flex; gap: 30px; padding: 20px; flex-wrap: wrap; justify-content: center; align-items: flex-start; }

        #canvas-wrapper { 
            position: relative; width: 600px; height: 600px; 
            border-radius: 50%; 
            border: 12px solid #1a1a1a; 
            box-shadow: 0 0 50px rgba(0,0,0,0.9), inset 0 0 20px var(--rose-dark);
            overflow: hidden; background: #000; cursor: none;
        }

        #hud { 
            display: flex; flex-direction: column; gap: 15px; width: 260px; 
            background: rgba(15, 15, 15, 0.95); 
            padding: 25px; border-radius: 5px; 
            border: 1px solid var(--rose-dark);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .hud-item { font-size: 1.1em; padding: 12px; border-bottom: 1px solid #222; text-align: center;}
        
        #darts-left-display { border: none; color: #ff4d4d; font-size: 1.8em; font-weight: bold; text-shadow: 0 0 10px var(--rose-bright);}
        #current-score { color: var(--gold); }
        #total-score { color: #fff; border-bottom: none; font-size: 1.4em; }
        
        #wind-status { 
            background: rgba(139, 0, 0, 0.2); 
            color: #ff7676; font-size: 0.9em; border: 1px solid var(--rose-dark);
        }
        
        input, button { 
            padding: 12px; border-radius: 0; border: 1px solid var(--rose-dark); 
            background: #1a0202; color: var(--gold); font-size: 1em; width: 100%; box-sizing: border-box;
        }

        button { 
            background: var(--rose-dark); color: white; cursor: pointer; transition: 0.3s; margin-top: 10px; 
            border: 1px solid var(--gold);
        }
        button:hover { background: var(--rose-bright); box-shadow: 0 0 15px var(--rose-bright); }
        
        #leaderboard { 
            width: 100%; max-width: 900px; margin-top: 40px; 
            background: rgba(10, 10, 10, 0.9); 
            padding: 30px; border: 1px solid var(--rose-dark); margin-bottom: 60px;
        }
        #leaderboard h2 { margin-top: 0; color: var(--gold); border-bottom: 1px solid var(--rose-dark); padding-bottom: 15px; letter-spacing: 2px;}
        #rankList { list-style: none; padding: 0; }
        #rankList li { 
            display: flex; justify-content: space-between; padding: 15px; 
            border-bottom: 1px solid #1a1a1a; transition: 0.2s;
        }
        #rankList li:hover { background: rgba(139, 0, 0, 0.1); }
        #rankList li:nth-child(1) { color: var(--gold); font-size: 1.3em; background: rgba(197, 160, 89, 0.05); }
        
        #fake-cursor { 
            position: absolute; width: 14px; height: 14px; 
            background: var(--gold); border: 2px solid #fff; border-radius: 50%; 
            pointer-events: none; transform: translate(-50%, -50%); z-index: 10;
            box-shadow: 0 0 10px var(--gold);
        }
    </style>
</head>
<body>
    <h1>CASINO EDEN</h1>
    <div id="description">10발의 다트로 최고 점수에 도전하세요.</div>
    
    <div id="game-container">
        <div id="canvas-wrapper">
            <div id="fake-cursor"></div>
            <canvas id="dartBoard" width="600" height="600"></canvas>
        </div>
        <div id="hud">
            <div id="darts-left-display" class="hud-item">남은 다트: 10개</div>
            <div id="current-score" class="hud-item">Hit: <span id="current-score-val">0</span></div>
            <div id="total-score" class="hud-item">TOTAL: <span id="total-score-val">0</span></div>
            <div id="wind-status" class="hud-item"><div id="wind-desc">바람 계산 중...</div></div>
            <div id="game-over-zone" style="display:none; flex-direction:column; gap:10px;">
                <input type="text" id="playerName" placeholder="Enter Your Name">
                <button id="submitBtn" onclick="submitScore()">RECORD LEGEND</button>
                <button style="background:#222;" onclick="location.reload()">RETRY</button>
            </div>
        </div>
    </div>
    
    <div id="leaderboard">
        <h2>전설의 전당 (Top 10)</h2>
        <ul id="rankList">Loading Legends...</ul>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyC4cS9GhEAz32y9k11o5B950mbWxULZ1BY",
            authDomain: "eden-dc2c5.firebaseapp.com",
            projectId: "eden-dc2c5",
            databaseURL: "https://eden-dc2c5-default-rtdb.asia-southeast1.firebasedatabase.app",
            storageBucket: "eden-dc2c5.firebasestorage.app",
            messagingSenderId: "889059945973",
            appId: "1:889059945973:web:211078b67f46e6796d04bc"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const canvas = document.getElementById('dartBoard');
        const ctx = canvas.getContext('2d');
        const fakeCursor = document.getElementById('fake-cursor');
        
        let score = 0, dartsLeft = 10, isGameOver = false;
        let mouseX = 300, mouseY = 300, finalX = 300, finalY = 300;
        let targetRotation = 0, rotationSpeed = 0.05, wind = { x: 0, y: 0 };
        const SHAKE = 80;

        const dartBoardImg = new Image();
        // 깃허브 경로 문제를 방지하기 위해 같은 폴더에 있는 이미지 호출
        dartBoardImg.src = 'image_6.png'; 

        dartBoardImg.onload = function() {
            changeWind();
            update();
        };
        // 이미지 로드 실패 대비
        dartBoardImg.onerror = function() {
            console.error("이미지를 찾을 수 없습니다. 파일명이 image_6.png 인지 확인하세요.");
        };

        function drawBoard() {
            ctx.clearRect(0, 0, 600, 600);
            ctx.save();
            ctx.translate(300, 300);
            targetRotation += rotationSpeed;
            if(Math.random() < 0.02) rotationSpeed = (Math.random() - 0.5) * 0.15;
            ctx.rotate(targetRotation);
            ctx.drawImage(dartBoardImg, -300, -300, 600, 600);
            ctx.restore();
        }

        function update() {
            if (isGameOver) return;
            finalX = mouseX + (Math.random() - 0.5) * SHAKE;
            finalY = mouseY + (Math.random() - 0.5) * SHAKE;
            fakeCursor.style.left = finalX + 'px';
            fakeCursor.style.top = finalY + 'px';
            drawBoard();
            requestAnimationFrame(update);
        }

        function changeWind() {
            if (isGameOver) return;
            const dirs = ['N', 'NE', 'E', 'SE', 'S', 'SW', 'W', 'NW'];
            const dir = dirs[Math.floor(Math.random() * 8)];
            const s = Math.floor(Math.random() * 50) + 10;
            wind.x = dir.includes('E') ? s : (dir.includes('W') ? -s : 0);
            wind.y = dir.includes('S') ? s : (dir.includes('N') ? -s : 0);
            document.getElementById('wind-desc').innerText = `Wind: ${dir} (${s}m/s)`;
            setTimeout(changeWind, 3000);
        }

        canvas.addEventListener('mousemove', (e) => {
            const r = canvas.getBoundingClientRect();
            mouseX = e.clientX - r.left; mouseY = e.clientY - r.top;
        });

        canvas.addEventListener('mousedown', () => {
            if (isGameOver || dartsLeft <= 0) return;
            const sx = finalX + wind.x, sy = finalY + wind.y;
            const dist = Math.sqrt((sx - 300)**2 + (sy - 300)**2);
            
            // 다트판 반경 설정 (600px 기준)
            const radii = { b_eye: 12, s_bull: 32, t_start: 165, t_end: 185, d_start: 265, d_end: 285 };

            let s = 0;
            if (dist > radii.d_end) { s = 0; }
            else if (dist <= radii.b_eye) { s = 50; }
            else if (dist <= radii.s_bull) { s = 25; }
            else {
                const angle = Math.atan2(sy - 300, sx - 300) - targetRotation;
                const scores = [6, 13, 4, 18, 1, 20, 5, 12, 9, 14, 11, 8, 16, 7, 19, 3, 17, 2, 15, 10];
                const sectorSize = (Math.PI * 2) / 20;
                let sectorIndex = Math.floor((angle + Math.PI + (sectorSize / 2)) / sectorSize) % 20;
                let baseScore = scores[sectorIndex];

                if (dist >= radii.t_start && dist <= radii.t_end) s = baseScore * 3;
                else if (dist >= radii.d_start && dist <= radii.d_end) s = baseScore * 2;
                else s = baseScore;
            }

            score += s; dartsLeft--;
            document.getElementById('current-score-val').innerText = s;
            document.getElementById('total-score-val').innerText = score;
            document.getElementById('darts-left-display').innerText = `남은 다트: ${dartsLeft}개`;
            if (dartsLeft <= 0) endGame();
        });

        function endGame() { 
            isGameOver = true; 
            document.getElementById('game-over-zone').style.display = 'flex'; 
            fakeCursor.style.display = 'none';
        }

        function submitScore() {
            const name = document.getElementById('playerName').value.trim();
            if (name.length < 2) return alert("Please enter your name.");
            document.getElementById('submitBtn').disabled = true;
            db.ref('rankingPro/').push({ name: name, score: Number(score), date: Date.now() })
            .then(() => { alert("Legend Recorded."); document.getElementById('game-over-zone').style.display = 'none'; });
        }

        db.ref('rankingPro/').orderByChild('score').on('value', (snap) => {
            const list = document.getElementById('rankList');
            list.innerHTML = '';
            let items = [];
            snap.forEach(child => items.push(child.val()));
            items.sort((a, b) => b.score - a.score);
            items.slice(0, 10).forEach((d, i) => {
                list.innerHTML += `<li><span><b>#${i+1}</b> ${d.name}</span><span><b>${d.score} PT</b></span></li>`;
            });
            if(items.length === 0) list.innerHTML = "<li>No Legends Yet.</li>";
        });
    </script>
</body>
</html>
