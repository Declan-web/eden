<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CASINO EDEN</title>
    <style>
        :root {
            --black-rose: #2d0a0a;
            --deep-red: #6d0000;
            --gold: #d4af37;
            --dark-bg: #050505;
        }

        body { 
            margin: 0; padding: 0; 
            background: radial-gradient(circle at center, var(--black-rose) 0%, var(--dark-bg) 100%); 
            color: #f0f0f0; font-family: 'Times New Roman', serif; 
            display: flex; flex-direction: column; align-items: center; min-height: 100vh; 
        }

        h1 { 
            margin: 40px 0 10px; color: var(--gold); font-size: 3.5em; letter-spacing: 8px;
            text-shadow: 0 0 20px rgba(212, 175, 55, 0.4); 
        }

        #description { color: #888; margin-bottom: 40px; font-style: italic; letter-spacing: 1px; }

        #game-container { display: flex; gap: 40px; justify-content: center; align-items: flex-start; padding: 20px; }

        /* 다트판 래퍼 디자인 개선 */
        #canvas-wrapper { 
            position: relative; width: 600px; height: 600px; border-radius: 50%; 
            border: 15px solid #111; box-shadow: 0 0 60px rgba(0,0,0,0.9), 0 0 20px var(--deep-red);
            overflow: hidden; background: #000; cursor: none;
        }

        /* UI 패널 디자인 개선 */
        #hud { 
            width: 280px; background: rgba(0, 0, 0, 0.8); padding: 30px; 
            border: 1px solid var(--deep-red); box-shadow: 0 0 30px rgba(109, 0, 0, 0.2);
            border-radius: 4px;
        }

        .hud-label { color: #666; font-size: 0.8em; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 5px; }
        .hud-value { font-size: 1.8em; margin-bottom: 25px; border-bottom: 1px solid #222; padding-bottom: 10px; }
        
        #darts-left-display { color: #ff3e3e; font-weight: bold; text-shadow: 0 0 10px rgba(255, 62, 62, 0.5); }
        #total-score-val { color: var(--gold); }
        
        #wind-status { font-size: 0.9em; color: #ff7676; border: 1px solid var(--deep-red); padding: 10px; margin-top: 10px; }

        input, button { 
            width: 100%; padding: 15px; background: #111; border: 1px solid var(--gold); 
            color: var(--gold); font-family: serif; font-size: 1.1em; margin-top: 10px; outline: none;
        }

        button { background: var(--deep-red); color: white; border: none; cursor: pointer; transition: 0.3s; font-weight: bold; }
        button:hover { background: #900; box-shadow: 0 0 15px var(--deep-red); }

        /* 랭킹 디자인 개선 */
        #leaderboard { 
            width: 920px; margin: 50px 0; background: rgba(10, 10, 10, 0.95); 
            padding: 40px; border: 1px solid #222; border-top: 3px solid var(--gold);
        }
        #leaderboard h2 { color: var(--gold); margin-top: 0; letter-spacing: 3px; font-size: 1.8em; text-align: center; }
        #rankList { list-style: none; padding: 0; }
        #rankList li { 
            display: flex; justify-content: space-between; padding: 15px 20px; 
            border-bottom: 1px solid #1a1a1a; font-size: 1.1em;
        }
        #rankList li.top-rank { background: rgba(212, 175, 55, 0.05); color: var(--gold); font-weight: bold; }

        #fake-cursor { 
            position: absolute; width: 10px; height: 10px; background: #fff; border-radius: 50%; 
            pointer-events: none; transform: translate(-50%, -50%); z-index: 10;
            box-shadow: 0 0 15px #fff, 0 0 5px var(--gold);
        }
    </style>
</head>
<body>
    <h1>CASINO EDEN</h1>
    <div id="description">10발의 다트로 완성하는 불멸의 기록</div>
    
    <div id="game-container">
        <div id="canvas-wrapper">
            <div id="fake-cursor"></div>
            <canvas id="dartBoard" width="600" height="600"></canvas>
        </div>
        <div id="hud">
            <div class="hud-label">Ammo</div>
            <div id="darts-left-display" class="hud-value">남은 다트: 10개</div>
            
            <div class="hud-label">Total Score</div>
            <div class="hud-value"><span id="total-score-val">0</span> PT</div>
            
            <div class="hud-label">Last Hit</div>
            <div style="color:#eee" class="hud-value"><span id="current-score-val">0</span></div>

            <div id="wind-status"><div id="wind-desc">바람 계산 중...</div></div>

            <div id="game-over-zone" style="display:none; flex-direction:column; margin-top:20px;">
                <input type="text" id="playerName" placeholder="NAME (3-10자)">
                <button id="submitBtn" onclick="submitScore()">ENTER LEGACY</button>
            </div>
        </div>
    </div>
    
    <div id="leaderboard">
        <h2>전설의 전당 (Top 10)</h2>
        <ul id="rankList">랭킹 데이터를 동기화 중입니다...</ul>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyC4cS9GhEAz32y9k11o5B950mbWxULZ1BY",
            authDomain: "eden-dc2c5.firebaseapp.com",
            projectId: "eden-dc2c5",
            databaseURL: "https://eden-dc2c5-default-rtdb.asia-southeast1.firebasedatabase.app",
            storageBucket: "eden-dc2c5.firebasestorage.app",
            messagingSenderId: "889059945973",
            appId: "1:889059945973:web:211078b67f46e6796d04bc"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const canvas = document.getElementById('dartBoard');
        const ctx = canvas.getContext('2d');
        const fakeCursor = document.getElementById('fake-cursor');
        
        let score = 0, dartsLeft = 10, isGameOver = false;
        let mouseX = 300, mouseY = 300, finalX = 300, finalY = 300;
        let targetRotation = 0, rotationSpeed = 0.05, wind = { x: 0, y: 0 };
        const SHAKE = 85;

        // 이미지 로드 강제 대기 시스템
        const dartBoardImg = new Image();
        dartBoardImg.src = 'image_6.png'; 
        
        let imgLoaded = false;
        dartBoardImg.onload = () => { imgLoaded = true; };
        dartBoardImg.onerror = () => { alert("image_6.png 파일을 찾을 수 없습니다. 경로를 확인하세요!"); };

        function drawBoard() {
            ctx.clearRect(0, 0, 600, 600);
            if (!imgLoaded) {
                // 이미지가 없을 때 시각적 피드백
                ctx.fillStyle = "#111"; ctx.beginPath(); ctx.arc(300,300,290,0,Math.PI*2); ctx.fill();
                ctx.fillStyle = var(--gold); ctx.textAlign="center"; ctx.fillText("LOADING IMAGE...", 300, 300);
                return;
            }
            ctx.save();
            ctx.translate(300, 300);
            targetRotation += rotationSpeed;
            if(Math.random() < 0.02) rotationSpeed = (Math.random() - 0.5) * 0.15;
            ctx.rotate(targetRotation);
            ctx.drawImage(dartBoardImg, -300, -300, 600, 600);
            ctx.restore();
        }

        function update() {
            if (isGameOver) return;
            finalX = mouseX + (Math.random() - 0.5) * SHAKE;
            finalY = mouseY + (Math.random() - 0.5) * SHAKE;
            fakeCursor.style.left = finalX + 'px';
            fakeCursor.style.top = finalY + 'px';
            drawBoard();
            requestAnimationFrame(update);
        }

        function changeWind() {
            if (isGameOver) return;
            const dirs = ['N', 'NE', 'E', 'SE', 'S', 'SW', 'W', 'NW'];
            const dir = dirs[Math.floor(Math.random() * 8)];
            const s = Math.floor(Math.random() * 55) + 15;
            wind.x = dir.includes('E') ? s : (dir.includes('W') ? -s : 0);
            wind.y = dir.includes('S') ? s : (dir.includes('N') ? -s : 0);
            document.getElementById('wind-desc').innerText = `WIND: ${dir} ${s}m/s`;
            setTimeout(changeWind, 2500);
        }

        canvas.addEventListener('mousemove', (e) => {
            const r = canvas.getBoundingClientRect();
            mouseX = e.clientX - r.left; mouseY = e.clientY - r.top;
        });

        canvas.addEventListener('mousedown', () => {
            if (isGameOver || dartsLeft <= 0) return;
            const sx = finalX + wind.x, sy = finalY + wind.y;
            const dist = Math.sqrt((sx - 300)**2 + (sy - 300)**2);
            const radii = { b_eye: 12, s_bull: 35, t_start: 165, t_end: 185, d_start: 265, d_end: 285 };

            let s = 0;
            if (dist > radii.d_end) s = 0;
            else if (dist <= radii.b_eye) s = 50;
            else if (dist <= radii.s_bull) s = 25;
            else {
                const angle = Math.atan2(sy - 300, sx - 300) - targetRotation;
                const scores = [6, 13, 4, 18, 1, 20, 5, 12, 9, 14, 11, 8, 16, 7, 19, 3, 17, 2, 15, 10];
                const sectorSize = (Math.PI * 2) / 20;
                let sectorIndex = Math.floor((angle + Math.PI + (sectorSize / 2)) / sectorSize) % 20;
                let baseScore = scores[sectorIndex];
                if (dist >= radii.t_start && dist <= radii.t_end) s = baseScore * 3;
                else if (dist >= radii.d_start && dist <= radii.d_end) s = baseScore * 2;
                else s = baseScore;
            }

            score += s; dartsLeft--;
            document.getElementById('current-score-val').innerText = s;
            document.getElementById('total-score-val').innerText = score;
            document.getElementById('darts-left-display').innerText = `남은 다트: ${dartsLeft}개`;
            if (dartsLeft <= 0) endGame();
        });

        function endGame() { 
            isGameOver = true; 
            document.getElementById('game-over-zone').style.display = 'flex'; 
            fakeCursor.style.display = 'none';
        }

        function submitScore() {
            const name = document.getElementById('playerName').value.trim();
            if (name.length < 3) return alert("닉네임을 3자 이상 입력하세요.");
            document.getElementById('submitBtn').disabled = true;
            
            db.ref('rankingPro/').push({
                name: name,
                score: Number(score),
                date: Date.now()
            }).then(() => {
                alert("기록이 전설의 전당에 새겨졌습니다.");
                location.reload();
            });
        }

        // 랭킹 리스너 로직 대폭 강화 (TOP 10 정렬 보장)
        db.ref('rankingPro/').orderByChild('score').on('value', (snap) => {
            const list = document.getElementById('rankList');
            list.innerHTML = '';
            let data = [];
            snap.forEach(c => { data.push(c.val()); });
            
            // 점수 내림차순 정렬 후 10개 추출
            data.sort((a, b) => b.score - a.score);
            const top10 = data.slice(0, 10);

            if(top10.length === 0) {
                list.innerHTML = "<li style='text-align:center; color:#555;'>아직 기록된 데이터가 없습니다.</li>";
                return;
            }

            top10.forEach((item, i) => {
                const isTop = i < 3 ? 'top-rank' : '';
                list.innerHTML += `<li class="${isTop}">
                    <span><b>#${i+1}</b> ${item.name}</span>
                    <span>${item.score.toLocaleString()} PT</span>
                </li>`;
            });
        });

        changeWind(); update();
    </script>
</body>
</html>
