<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>CASINO EDEN</title>
    <style>
        :root { --red: #5e0000; --gold: #d4af37; --black: #0a0a0a; }
        body { 
            margin: 0; background: radial-gradient(circle, var(--red) 0%, var(--black) 100%); 
            color: #eee; font-family: 'Georgia', serif; display: flex; flex-direction: column; align-items: center; 
        }
        h1 { color: var(--gold); font-size: 3.5em; letter-spacing: 10px; margin: 40px 0 10px; text-shadow: 0 0 20px rgba(212,175,55,0.4); }
        #game-container { display: flex; gap: 30px; margin-top: 20px; }
        #canvas-wrapper { 
            position: relative; width: 600px; height: 600px; border-radius: 50%; 
            border: 15px solid #111; box-shadow: 0 0 50px #000; overflow: hidden; cursor: none;
        }
        #hud { width: 280px; background: rgba(0,0,0,0.8); padding: 30px; border: 1px solid var(--red); box-shadow: 0 0 20px rgba(94,0,0,0.5); }
        .stat { margin-bottom: 20px; border-bottom: 1px solid #222; padding-bottom: 10px; }
        .label { color: #888; font-size: 0.8em; text-transform: uppercase; }
        .val { font-size: 1.8em; color: var(--gold); }
        input, button { width: 100%; padding: 12px; margin-top: 10px; border: 1px solid var(--gold); background: #000; color: var(--gold); outline: none; }
        button { background: var(--red); color: white; border: none; font-weight: bold; cursor: pointer; }
        #leaderboard { width: 920px; margin: 50px 0; background: rgba(0,0,0,0.9); padding: 30px; border: 1px solid #333; border-top: 3px solid var(--gold); }
        #rankList { list-style: none; padding: 0; }
        #rankList li { display: flex; justify-content: space-between; padding: 15px; border-bottom: 1px solid #1a1a1a; }
        #fake-cursor { position: absolute; width: 12px; height: 12px; background: #fff; border-radius: 50%; pointer-events: none; transform: translate(-50%, -50%); z-index: 10; box-shadow: 0 0 10px var(--gold); }
    </style>
</head>
<body>
    <h1>CASINO EDEN</h1>
    <div id="game-container">
        <div id="canvas-wrapper">
            <div id="fake-cursor"></div>
            <canvas id="dartBoard" width="600" height="600"></canvas>
        </div>
        <div id="hud">
            <div class="stat"><div class="label">Ammo</div><div id="darts" class="val">10</div></div>
            <div class="stat"><div class="label">Total</div><div id="total" class="val">0 PT</div></div>
            <div id="wind-box" style="color:#ff7676; font-size:0.9em; text-align:center;">바람 계산 중...</div>
            <div id="over-ui" style="display:none">
                <input type="text" id="nick" placeholder="NICKNAME">
                <button onclick="send()">RECORD LEGEND</button>
            </div>
        </div>
    </div>
    <div id="leaderboard">
        <h2 style="color:var(--gold); text-align:center; letter-spacing:3px;">전설의 전당 (TOP 10)</h2>
        <ul id="rankList">데이터를 동기화 중입니다...</ul>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        // 보내주신 설정값으로 업데이트
        const firebaseConfig = {
            apiKey: "AIzaSyC4cS9GhEAz32y9k11o5B950mbWxULZ1BY",
            authDomain: "eden-dc2c5.firebaseapp.com",
            databaseURL: "https://eden-dc2c5-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "eden-dc2c5",
            storageBucket: "eden-dc2c5.firebasestorage.app",
            messagingSenderId: "889059945973",
            appId: "1:889059945973:web:211078b67f46e6796d04bc"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const cvs = document.getElementById('dartBoard');
        const ctx = cvs.getContext('2d');
        const img = new Image();
        img.src = 'image_6.png'; // 깃허브에 올리신 파일명

        let score = 0, darts = 10, over = false;
        let mx = 300, my = 300, rot = 0, wx = 0, wy = 0;

        img.onload = () => { loop(); windTick(); };
        img.onerror = () => { alert("이미지를 불러올 수 없습니다!"); };

        function loop() {
            if(over) return;
            ctx.clearRect(0,0,600,600);
            ctx.save();
            ctx.translate(300,300);
            rot += 0.04;
            ctx.rotate(rot);
            ctx.drawImage(img, -300, -300, 600, 600);
            ctx.restore();
            
            // 수전증 효과
            let tx = mx + (Math.random()-0.5)*85;
            let ty = my + (Math.random()-0.5)*85;
            document.getElementById('fake-cursor').style.left = tx+'px';
            document.getElementById('fake-cursor').style.top = ty+'px';
            
            window.targetX = tx; window.targetY = ty;
            requestAnimationFrame(loop);
        }

        cvs.onmousemove = (e) => { const r = cvs.getBoundingClientRect(); mx = e.clientX-r.left; my = e.clientY-r.top; };
        cvs.onmousedown = () => {
            if(over || darts <= 0) return;
            const finalX = window.targetX + wx, finalY = window.targetY + wy;
            const d = Math.sqrt((finalX-300)**2 + (finalY-300)**2);
            let p = 0;
            if(d < 15) p = 50; else if(d < 35) p = 25; else if(d < 285) p = Math.floor(Math.random()*20)+1;
            
            score += p; darts--;
            document.getElementById('total').innerText = score + " PT";
            document.getElementById('darts').innerText = darts;
            if(darts <= 0) { over = true; document.getElementById('over-ui').style.display='block'; }
        };

        function windTick() {
            if(over) return;
            wx = (Math.random()-0.5)*40; wy = (Math.random()-0.5)*40;
            document.getElementById('wind-box').innerText = `WIND: ${Math.abs(Math.floor(wx))}m/s`;
            setTimeout(windTick, 2500);
        }

        function send() {
            const n = document.getElementById('nick').value;
            if(!n) return alert("이름을 입력하세요!");
            db.ref('rankingPro').push({name:n, score:score}).then(() => location.reload());
        }

        // 랭킹 불러오기 (멈춤 현상 해결)
        db.ref('rankingPro').on('value', (snap) => {
            const list = document.getElementById('rankList');
            list.innerHTML = '';
            let items = [];
            snap.forEach(c => { items.push(c.val()); });
            items.sort((a,b) => b.score - a.score);
            items.slice(0,10).forEach((v, i) => {
                list.innerHTML += `<li><span>#${i+1} ${v.name}</span><span>${v.score} PT</span></li>`;
            });
            if(items.length === 0) list.innerHTML = "<li>등록된 전설이 없습니다.</li>";
        });
    </script>
</body>
</html>
